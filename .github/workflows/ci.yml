name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  frontend:
    name: Build frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/Bookmate.UI
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: src/Bookmate.UI/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          # Set in GitHub → Settings → Secrets to your Render backend URL.
          # No localhost fallback — a missing secret should be a visible failure.
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
          VITE_BASE_PATH: /Bookmate/

  backend:
    name: Test backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/Bookmate.API
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Run tests
        run: pytest -v
        env:
          DATABASE_URL: sqlite+aiosqlite:///./test_bookmate.db
          JWT_SECRET_KEY: test-secret-key
          BACKEND_CORS_ORIGINS: http://localhost:5173

  deploy-backend:
    name: Deploy backend to Render
    needs: backend
    # Only deploy on direct pushes to main (not PRs)
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Render deploy hook
        # Set RENDER_DEPLOY_HOOK_URL in GitHub → Settings → Secrets.
        # Get the URL from: Render dashboard → your service → Settings → Deploy Hook.
        run: |
          curl -fsSL -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}"
