name: Deploy frontend to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: src/Bookmate.UI/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: src/Bookmate.UI

      - name: Build
        run: npm run build
        working-directory: src/Bookmate.UI
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL || 'http://localhost:8000' }}
          VITE_BASE_PATH: /${{ github.event.repository.name }}/

      - name: Add SPA fallback for GitHub Pages
        run: cp dist/index.html dist/404.html
        working-directory: src/Bookmate.UI

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: src/Bookmate.UI/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
