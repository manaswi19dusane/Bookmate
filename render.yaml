services:
  - type: web
    name: bookmate-api
    env: python
    plan: free
    rootDir: src/Bookmate.API
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: APP_NAME
        value: Bookmate
      - key: DEBUG
        value: false
      - key: DATABASE_URL
        fromDatabase:
          name: bookmate-db
          property: connectionString
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: ENABLE_SAMPLE_DATA
        value: false
      - key: FRONTEND_URL
        sync: false
      - key: BACKEND_CORS_ORIGINS
        sync: false
      - key: OPENAI_API_KEY
        sync: false

databases:
  - name: bookmate-db
    plan: free
    databaseName: bookmate
    user: bookmate
